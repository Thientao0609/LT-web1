<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sinh viên</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        table, th, td { border: 1px solid black; }
        th, td { padding: 8px; text-align: center; }
        input { padding: 5px; margin: 5px; }
        button { padding: 6px 12px; }
        .edit-btn { background: orange; }
        .delete-btn { background: red; color: white; }
        .save-btn { background: green; color: white; }
    </style>
</head>
<body>

<h2>QUẢN LÝ SINH VIÊN</h2>

<!-- FORM THÊM / SỬA -->
<form th:action="@{/students/save}" th:object="${student}" method="post">

    <input type="hidden" th:field="*{id}" />

    <input type="text" th:field="*{name}" placeholder="Họ tên" required />
    <input type="number" th:field="*{age}" placeholder="Tuổi" required />
    <input type="email" th:field="*{email}" placeholder="Email" required />

    <button type="submit" class="save-btn">Lưu</button>

</form>

<!-- DANH SÁCH -->
<table>
    <tr>
        <th>ID</th>
        <th>Họ tên</th>
        <th>Tuổi</th>
        <th>Email</th>
        <th>Thao tác</th>
    </tr>

    <tr th:each="s : ${students}">
        <td th:text="${s.id}"></td>
        <td th:text="${s.name}"></td>
        <td th:text="${s.age}"></td>
        <td th:text="${s.email}"></td>
        <td>
            <a th:href="@{/students/edit/{id}(id=${s.id})}">
                <button class="edit-btn">Sửa</button>
            </a>

            <a th:href="@{/students/delete/{id}(id=${s.id})}"
               onclick="return confirm('Bạn có chắc muốn xóa?')">
                <button class="delete-btn">Xóa</button>
            </a>
        </td>
    </tr>
</table>

</body>
</html>
