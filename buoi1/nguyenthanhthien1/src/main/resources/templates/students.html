<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sinh viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <div class="card p-4 shadow-sm mb-5">
        <h2 class="text-primary">Thêm sinh viên mới</h2>
        <form th:action="@{/students/save}" th:object="${student}" method="post" class="row g-3">
            <div class="col-md-4">
                <input type="text" th:field="*{name}" class="form-control" placeholder="Tên sinh viên" required>
            </div>
            <div class="col-md-2">
                <input type="number" th:field="*{age}" class="form-control" placeholder="Tuổi" required min="1">
            </div>
            <div class="col-md-4">
                <input type="email" th:field="*{email}" class="form-control" placeholder="Email" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Thêm nhanh</button>
            </div>
        </form>
    </div>

    <hr>

    <h2>Danh sách sinh viên</h2>
    <table class="table table-striped table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Tuổi</th> <th>Email</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="s : ${students}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.name}"></td>
                <td th:text="${s.age}"></td> <td th:text="${s.email}"></td>
                <td>
                    <div class="btn-group">
                        <a th:href="@{/students/edit/{id}(id=${s.id})}" class="btn btn-warning btn-sm">Sửa</a>
                        <a th:href="@{/students/delete/{id}(id=${s.id})}" 
                           class="btn btn-danger btn-sm" 
                           onclick="return confirm('Bạn có chắc chắn muốn xóa?')">Xóa</a>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
