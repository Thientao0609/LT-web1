<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin sinh viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="mb-4" th:text="${student.id == null} ? 'Thêm sinh viên mới' : 'Cập nhật sinh viên'"></h2>
        
        <form th:action="@{/students/save}" th:object="${student}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label fw-bold">Tên sinh viên:</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập họ tên..." required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Tuổi:</label>
                <input type="number" th:field="*{age}" class="form-control" placeholder="Nhập số tuổi..." required min="18">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Email:</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="example@gmail.com" required>
            </div>
            
            <div class="mt-4">
                <button type="submit" class="btn btn-success px-4">Lưu dữ liệu</button>
                <a th:href="@{/students}" class="btn btn-secondary px-4">Hủy bỏ</a>
            </div>
        </form>
    </div>
</body>
</html>
