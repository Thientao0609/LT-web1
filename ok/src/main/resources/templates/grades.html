<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Điểm Sinh Viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4e73df, #1cc88a);
            min-height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
        .title {
            font-weight: bold;
            color: white;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4 title">📘 QUẢN LÝ ĐIỂM SINH VIÊN</h2>

    <!-- FORM -->
    <div class="card shadow p-4 mb-4">
        <h5>➕ Thêm Điểm</h5>

        <form id="gradeForm">
            <div class="row">
                <div class="col-md-3">
                    <input type="number" class="form-control" id="enrollmentId" placeholder="Enrollment ID" required>
                </div>
                <div class="col-md-3">
                    <input type="number" step="0.1" class="form-control" id="midtermScore" placeholder="Điểm giữa kỳ" required>
                </div>
                <div class="col-md-3">
                    <input type="number" step="0.1" class="form-control" id="assignmentScore" placeholder="Điểm bài tập" required>
                </div>
                <div class="col-md-3">
                    <input type="number" step="0.1" class="form-control" id="finalScore" placeholder="Điểm cuối kỳ" required>
                </div>
            </div>

            <button type="submit" class="btn btn-success mt-3 w-100">Lưu</button>
        </form>
    </div>

    <!-- TABLE -->
    <div class="card shadow p-4">
        <h5>📋 Danh Sách Điểm</h5>

        <table class="table table-striped mt-3">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Enrollment</th>
                <th>Giữa kỳ</th>
                <th>Bài tập</th>
                <th>Cuối kỳ</th>
            </tr>
            </thead>
            <tbody id="gradeTable">
            </tbody>
        </table>
    </div>

</div>

<script>
    const apiUrl = "/api/grades";

    function loadGrades() {
        fetch(apiUrl)
            .then(res => res.json())
            .then(data => {
                const table = document.getElementById("gradeTable");
                table.innerHTML = "";

                data.forEach(g => {
                    table.innerHTML += `
                        <tr>
                            <td>${g.id}</td>
                            <td>${g.enrollmentId}</td>
                            <td>${g.midtermScore}</td>
                            <td>${g.assignmentScore}</td>
                            <td>${g.finalScore}</td>
                        </tr>
                    `;
                });
            });
    }

    document.getElementById("gradeForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const newGrade = {
            enrollmentId: document.getElementById("enrollmentId").value,
            midtermScore: document.getElementById("midtermScore").value,
            assignmentScore: document.getElementById("assignmentScore").value,
            finalScore: document.getElementById("finalScore").value
        };

        fetch(apiUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(newGrade)
        })
        .then(() => {
            loadGrades();
            this.reset();
        });
    });

    loadGrades();
</script>

</body>
</html>
